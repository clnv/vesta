server:
  listen: ":8080"
  external_url: "http://localhost:18080"

auth:
  session_secret_env: "VESTA_SESSION_SECRET"
  session_ttl: "1h"
  bootstrap:
    email: "integration@localhost"
    name: "Integration test"
    password_env: "VESTA_BOOTSTRAP_PASSWORD"
    team: "integration"
    roles: ["reader"]

storage:
  path: "/var/lib/vesta/vesta.db"
  share_ttl: "168h"

limits:
  query_timeout: "30s"
  max_rows: 50000
  max_bytes: 33554432
  max_queries_per_user: 4
  max_line_bytes: 8388608

sources:
  - id: "payments"
    name: "Payments"
    url: "http://victorialogs:9428"
    roles: ["reader"]
    account_id: "12"
    project_id: "34"
    auth:
      type: "none"
    hidden_fields: ["password*"]
  - id: "search"
    name: "Search"
    url: "http://victorialogs:9428"
    roles: ["reader"]
    account_id: "56"
    project_id: "78"
    auth:
      type: "none"
    hidden_fields: ["password*"]
