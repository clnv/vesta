services:
  victorialogs:
    image: victoriametrics/victoria-logs:v1.52.0
    command:
      - -storageDataPath=/victoria-logs-data
      - -retentionPeriod=1d
    ports:
      - "19428:9428"
    volumes:
      - victoria-logs-data:/victoria-logs-data

  vesta-api:
    image: vesta-api:local
    build:
      context: .
      dockerfile: api.Dockerfile
    depends_on:
      - victorialogs
    environment:
      VESTA_BOOTSTRAP_PASSWORD: integration-password
      VESTA_SESSION_SECRET: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    volumes:
      - ./config.compose.yml:/etc/vesta/config.yml:ro
      - vesta-data:/var/lib/vesta

  vesta-web:
    image: vesta-web:local
    build:
      context: .
      dockerfile: web.Dockerfile
    command:
      - -api-url
      - http://vesta-api:8080
    depends_on:
      - vesta-api
    ports:
      - "18080:8081"

volumes:
  victoria-logs-data:
  vesta-data:
