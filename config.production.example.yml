server:
  listen: ":8080"
  external_url: "https://logs.example.com"

auth:
  session_secret_env: "VESTA_SESSION_SECRET"
  session_ttl: "1h"
  # Used only when the SQLite database has no users.
  bootstrap:
    email: "admin@example.com"
    name: "Vesta administrator"
    password_env: "VESTA_BOOTSTRAP_PASSWORD"
    team: "Platform"
    roles: ["prod-reader"]

storage:
  path: "/var/lib/vesta/vesta.db"
  # Expiring private links use this lifetime; accounts and team-library queries persist.
  share_ttl: "168h"

limits:
  query_timeout: "30s"
  max_rows: 50000
  max_bytes: 33554432
  max_queries_per_user: 4
  max_line_bytes: 8388608

sources:
  - id: "production"
    name: "Production"
    url: "https://vmauth.example.com"
    roles: ["prod-reader"]
    account_id: "12"
    project_id: "34"
    auth:
      type: "bearer"
      token_env: "VESTA_PRODUCTION_TOKEN"
    hidden_fields: ["password*", "authorization", "session_token"]
