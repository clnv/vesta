server:
  listen: ":8080"
  # Browser requests originate from Vite during local development.
  external_url: "http://localhost:5173"

auth:
  session_secret_env: "VESTA_SESSION_SECRET"
  session_ttl: "1h"
  bootstrap:
    email: "admin@localhost"
    name: "Local administrator"
    password_env: "VESTA_BOOTSTRAP_PASSWORD"
    team: "Local"
    roles: ["dev"]

storage:
  path: "./data/vesta.db"
  share_ttl: "168h"

limits:
  query_timeout: "30s"
  max_rows: 50000
  max_bytes: 33554432
  max_queries_per_user: 4
  max_tails_per_user: 2
  max_line_bytes: 8388608

sources:
  - id: "local"
    name: "Local VictoriaLogs"
    url: "http://localhost:9428"
    roles: ["dev"]
    tenants:
      - account_id: "0"
        project_id: "0"
        name: "default"
    auth:
      type: "none"
    hidden_fields: []
