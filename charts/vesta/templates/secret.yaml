{{- if and .Values.secret.create (not .Values.secret.existingSecret) }}
{{- $name := include "vesta.fullname" . }}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $name }}
{{- $existingData := dict }}
{{- if $existing }}
  {{- $existingData = default dict $existing.data }}
{{- end }}
{{- $sessionSecret := default "" (index .Values.secret.data "VESTA_SESSION_SECRET") | toString }}
{{- if not $sessionSecret }}
  {{- if hasKey $existingData "VESTA_SESSION_SECRET" }}
    {{- $sessionSecret = index $existingData "VESTA_SESSION_SECRET" | b64dec }}
  {{- else }}
    {{- $sessionSecret = randBytes 32 }}
  {{- end }}
{{- end }}
{{- $bootstrapPassword := default "" (index .Values.secret.data "VESTA_BOOTSTRAP_PASSWORD") | toString }}
{{- if not $bootstrapPassword }}
  {{- if hasKey $existingData "VESTA_BOOTSTRAP_PASSWORD" }}
    {{- $bootstrapPassword = index $existingData "VESTA_BOOTSTRAP_PASSWORD" | b64dec }}
  {{- else }}
    {{- $bootstrapPassword = randAlphaNum 32 }}
  {{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    {{- include "vesta.labels" . | nindent 4 }}
  {{- with .Values.secret.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secret.data }}
  {{- if and (ne $key "VESTA_SESSION_SECRET") (ne $key "VESTA_BOOTSTRAP_PASSWORD") }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}
  {{- end }}
  VESTA_SESSION_SECRET: {{ $sessionSecret | quote }}
  VESTA_BOOTSTRAP_PASSWORD: {{ $bootstrapPassword | quote }}
{{- end }}
