replicaCount: 1

api:
  image:
    repository: ghcr.io/clnv/vesta-api
    tag: "0.0.1"
    pullPolicy: IfNotPresent

web:
  image:
    repository: ghcr.io/clnv/vesta-web
    tag: "0.0.1"
    pullPolicy: IfNotPresent

config:
  data:
    server:
      listen: ":8080"
      external_url: https://logs.example.com
    auth:
      session_secret_env: VESTA_SESSION_SECRET
      session_ttl: 1h
      bootstrap:
        email: admin@example.com
        name: Vesta administrator
        password_env: VESTA_BOOTSTRAP_PASSWORD
        team: Platform
        roles:
          - prod-reader
    storage:
      path: /var/lib/vesta/vesta.db
      share_ttl: 168h
    limits:
      query_timeout: 30s
      max_rows: 50000
      max_bytes: 33554432
      max_queries_per_user: 4
      max_line_bytes: 8388608
    sources:
      - id: production
        name: Production
        url: https://vmauth.example.com
        roles:
          - prod-reader
        account_id: "12"
        project_id: "34"
        auth:
          type: bearer
          token_env: VESTA_PRODUCTION_TOKEN
        hidden_fields:
          - password*
          - authorization
          - session_token

secret:
  create: false
  existingSecret: vesta-secrets

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: logs.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: logs-example-com-tls
      hosts:
        - logs.example.com

podDisruptionBudget:
  enabled: true
  minAvailable: 1
