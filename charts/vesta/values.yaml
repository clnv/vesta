replicaCount: 1

api:
  image:
    repository: vesta-api
    pullPolicy: IfNotPresent
    tag: local
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: api
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthz
      port: api
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /healthz
      port: api
    periodSeconds: 2
    timeoutSeconds: 2
    failureThreshold: 30

web:
  image:
    repository: vesta-web
    pullPolicy: IfNotPresent
    tag: local
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 128Mi
  livenessProbe:
    httpGet:
      path: /healthz
      port: web
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /healthz
      port: web
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 2
    failureThreshold: 3
  startupProbe:
    httpGet:
      path: /healthz
      port: web
    periodSeconds: 2
    timeoutSeconds: 2
    failureThreshold: 30

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: false
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 80
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: vesta.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

persistence:
  enabled: true
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  annotations: {}

config:
  # When set, this ConfigMap must contain a config.yml key. config.data is ignored.
  existingConfigMap: ""
  data:
    server:
      listen: ":8080"
      external_url: "http://localhost:8080"
    auth:
      session_secret_env: VESTA_SESSION_SECRET
      session_ttl: 1h
      bootstrap:
        email: admin@localhost
        name: Local administrator
        password_env: VESTA_BOOTSTRAP_PASSWORD
        team: Local
        roles:
          - reader
    storage:
      path: /var/lib/vesta/vesta.db
      share_ttl: 168h
    limits:
      query_timeout: 30s
      max_rows: 50000
      max_bytes: 33554432
      max_queries_per_user: 4
      max_tails_per_user: 2
      max_line_bytes: 8388608
    sources:
      - id: local
        name: Local VictoriaLogs
        url: http://victorialogs:9428
        roles:
          - reader
        tenants:
          - account_id: "0"
            project_id: "0"
            name: default
        auth:
          type: none
        hidden_fields: []

secret:
  # Prefer existingSecret in production. Its keys are exposed to Vesta as env vars.
  existingSecret: ""
  # Development-only defaults so a local Helm install can sign in immediately.
  create: true
  annotations: {}
  data:
    VESTA_SESSION_SECRET: "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="
    VESTA_BOOTSTRAP_PASSWORD: "vesta-local-password"

extraEnv: []
extraEnvFrom: []
extraVolumes: []
extraVolumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

terminationGracePeriodSeconds: 20
revisionHistoryLimit: 3

podDisruptionBudget:
  enabled: false
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
