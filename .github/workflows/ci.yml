name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: GitHub Actions lint
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Lint workflow files and embedded shell
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

  api:
    name: API test and validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module checksums
        run: go mod verify
      - name: Check Go formatting
        shell: bash
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [[ -n "$unformatted" ]]; then
            echo "The following files require gofmt:"
            echo "$unformatted"
            exit 1
          fi
      - name: Run go vet
        run: go vet ./...
      - name: Run race-enabled tests with coverage
        run: go test -race -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...
      - name: Upload Go coverage
        if: always() && hashFiles('coverage.out') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: go-coverage
          path: coverage.out
          if-no-files-found: error
          retention-days: 14

  govulncheck:
    name: Go vulnerability scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Scan reachable Go vulnerabilities
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f # v1.1.0
        with:
          go-version-input: "1.26.5"
          go-package: ./...

  web:
    name: Web test and build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Run web tests
        run: npm test
      - name: Type-check and build production assets
        run: npm run build
      - name: Upload embedded UI assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: internal/webui/dist
          if-no-files-found: error
          retention-days: 7

  helm:
    name: Helm lint, render, and package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Helm
        uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3
      - name: Install Just
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: just@1.57.0
          fallback: none
      - name: Lint default and production values
        run: just helm-lint
      - name: Render default deployment
        run: helm template vesta ./charts/vesta --namespace vesta > /tmp/vesta-default.yaml
      - name: Render production deployment
        run: helm template vesta ./charts/vesta --namespace vesta --values ./charts/vesta/values-production.example.yaml > /tmp/vesta-production.yaml
      - name: Render optional resources and chart-managed Secret
        run: >-
          helm template features ./charts/vesta
          --set secret.create=true
          --set-string secret.data.VESTA_SESSION_SECRET=test-only
          --set persistence.enabled=false
          --set ingress.enabled=true
          --set podDisruptionBudget.enabled=true
          > /tmp/vesta-features.yaml
      - name: Render existing ConfigMap and Secret integration
        run: >-
          helm template existing ./charts/vesta
          --set config.existingConfigMap=vesta-config
          --set secret.create=false
          --set secret.existingSecret=vesta-secret
          --set persistence.existingClaim=vesta-data
          --set serviceAccount.create=false
          --set serviceAccount.name=vesta-runtime
          > /tmp/vesta-existing.yaml
      - name: Package chart
        run: |
          mkdir -p dist
          helm package ./charts/vesta --destination dist
      - name: Upload Helm chart
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: helm-chart
          path: dist/*.tgz
          if-no-files-found: error
          retention-days: 14

  integration:
    name: Container, VictoriaLogs, and Kind integration
    needs:
      - workflow-lint
      - api
      - web
      - helm
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install Just
        uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: just@1.57.0
          fallback: none
      - name: Validate Dockerfiles with BuildKit
        run: |
          docker build --check --file api.Dockerfile .
          docker build --check --file web.Dockerfile .
      - name: Run pinned VictoriaLogs integration suite
        run: just integration-test
      - name: Verify final image users
        shell: bash
        run: |
          for image in vesta-api:local vesta-web:local; do
            image_user="$(docker image inspect "$image" --format '{{.Config.User}}')"
            if [[ "$image_user" != "65532" ]]; then
              echo "Expected $image user 65532, got $image_user"
              exit 1
            fi
          done
      - name: Set up Helm
        uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v4.2.3
      - name: Create Kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.32.0
          kubectl_version: v1.36.1
          cluster_name: vesta-ci
          node_image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
          wait: 120s
      - name: Run Helm chart smoke test in Kind
        env:
          KIND_CLUSTER_NAME: vesta-ci
        run: ./scripts/kind-smoke-test.sh
